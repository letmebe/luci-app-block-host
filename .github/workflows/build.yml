name: Build LuCI App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: x86_64 build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64
          EXTRA_FEEDS: src-link|luci-app-block-host|${{ github.workspace }}/package/luci-app-block-host
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-packages
          path: bin/packages/x86_64/**/*.ipk
