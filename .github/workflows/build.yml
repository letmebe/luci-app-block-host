name: Build LuCI App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 全局环境变量，方便后续步骤引用
env:
  OPENWRT_VERSION: 23.05
  TARGET: x86
  SUBTARGET: 64
  ARCH: x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build with OpenWrt SDK
        run: |
          # 下载 OpenWrt SDK
          wget https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          
          # 复制插件到 SDK
          cp -r package/luci-app-block-host openwrt-sdk-*/package/
          
          # 进入 SDK 目录并编译
          cd openwrt-sdk-*
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make package/luci-app-block-host/compile V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-block-host-ipk
          path: openwrt-sdk-*/bin/packages/**/*.ipk

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: openwrt-sdk-*/bin/packages/**/*.ipk
