name: Build LuCI App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05
  TARGET: x86
  SUBTARGET: 64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        with:
          version: ${{ env.OPENWRT_VERSION }}
          target: ${{ env.TARGET }}
          subtarget: ${{ env.SUBTARGET }}
          
      - name: Setup feeds.conf.default
        run: |
          echo "src-git feeds https://github.com/openwrtfeeds/openwrtfeeds.git" > feeds.conf.default
          
      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Build package
        run: |
          echo "CONFIG_PACKAGE_luci-app-block-host=y" >> .config
          make defconfig
          make package/luci-app-block-host/compile V=s
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-block-host-ipk
          path: bin/packages/${{ env.TARGET }}/${{ env.SUBTARGET }}/luci-app-block-host*.ipk
          
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/packages/${{ env.TARGET }}/${{ env.SUBTARGET }}/luci-app-block-host*.ipk
