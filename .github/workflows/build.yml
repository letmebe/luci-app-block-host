name: Build LuCI App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 全局环境变量，方便后续步骤引用
env:
  OPENWRT_VERSION: 23.05
  TARGET: x86
  SUBTARGET: 64
  ARCH: x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK Docker
        run: |
          # 拉取 OpenWrt SDK Docker 镜像
          docker pull openwrt/sdk:x86-64-23.05.0
          
          # 运行容器并编译插件
          docker run --rm \
            -v ${{ github.workspace }}:/feed \
            openwrt/sdk:x86-64-23.05.0 \
            /bin/sh -c "cp -r /feed /feed_copy && cd /feed_copy && ./scripts/feeds update -a && ./scripts/feeds install -a && make package/luci-app-block-host/compile V=s"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-block-host-ipk
          path: bin/packages/**/*.ipk

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/packages/**/*.ipk
